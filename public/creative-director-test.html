<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Creative Director — Test Console</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #161a23;
    --panel-2: #1d2230;
    --border: #2a3142;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #8b5cf6;
    --accent-2: #bfff00;
    --user: #243044;
    --bot: #1d2230;
    --ok: #34d399;
    --err: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--border); }
  .pill.status { text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .pill.BRIEFING { color: var(--warn); border-color: var(--warn); }
  .pill.AWAITING_APPROVAL { color: var(--accent-2); border-color: var(--accent-2); }
  .pill.GENERATING { color: var(--accent); border-color: var(--accent); }
  .pill.COMPLETED { color: var(--ok); border-color: var(--ok); }
  .pill.ABANDONED { color: var(--err); border-color: var(--err); }

  main { flex: 1; display: grid; grid-template-columns: 320px 1fr 360px; min-height: 0; }
  .col { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  .col:last-child { border-right: none; }
  .col h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0; padding: 14px 16px 8px; }
  .col-body { padding: 0 16px 16px; overflow-y: auto; flex: 1; }

  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  input, textarea, button, select {
    width: 100%; font-family: inherit; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel-2); color: var(--text); padding: 9px 11px;
  }
  textarea { resize: vertical; min-height: 64px; }
  button {
    cursor: pointer; background: var(--accent); border: none; color: #fff; font-weight: 600; margin-top: 10px;
    transition: opacity .15s;
  }
  button:hover { opacity: .9; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.approve { background: var(--accent-2); color: #0d0f14; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

  /* chat */
  .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 10px 13px; border-radius: 12px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 3px; }
  .msg.assistant { align-self: flex-start; background: var(--bot); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.system { align-self: center; background: transparent; color: var(--muted); font-size: 12px; font-style: italic; }
  .composer { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); }
  .composer .row { align-items: flex-end; }
  .composer textarea { margin: 0; }
  .composer button { margin: 0; max-width: 120px; }

  pre { background: #0a0c11; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 11px; overflow-x: auto; color: var(--muted); margin: 8px 0 0; }
  .brief-field { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .brief-field .k { color: var(--muted); }
  .brief-field .v { text-align: right; max-width: 60%; }
  .brief-field .v.empty { color: var(--err); opacity: .6; }
  .brief-field .v.filled { color: var(--ok); }

  .log { font-family: ui-monospace, monospace; font-size: 11px; line-height: 1.5; }
  .log .l-ok { color: var(--ok); }
  .log .l-err { color: var(--err); }
  .log .l-info { color: var(--muted); }
  .proposal { background: var(--panel-2); border: 1px solid var(--accent-2); border-radius: 8px; padding: 12px; margin-top: 10px; }
  .proposal h3 { margin: 0 0 6px; font-size: 13px; color: var(--accent-2); }
  .proposal .p { font-size: 12px; color: var(--text); white-space: pre-wrap; }
  img.result { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
  .disconnected { opacity: .5; pointer-events: none; }
</style>
</head>
<body>
<header>
  <h1>Gera<span>EW</span> · Creative Director Console</h1>
  <span class="pill" id="apiPill">api: <span id="apiUrl">—</span></span>
  <span class="pill" id="sessionPill">session: <span id="sessionId">—</span></span>
  <span class="pill status" id="statusPill">—</span>
</header>

<main>
  <!-- LEFT: setup -->
  <section class="col">
    <h2>1 · Setup</h2>
    <div class="col-body">
      <label>API Base URL</label>
      <input id="baseUrl" value="http://localhost:3000" />

      <label>Email</label>
      <input id="email" placeholder="seu@email.com" />
      <label>Senha</label>
      <input id="password" type="password" placeholder="••••••••" />
      <button id="loginBtn">Entrar</button>
      <div class="hint" id="authHint">Faça login para obter o token JWT.</div>

      <label>Token (auto)</label>
      <textarea id="token" placeholder="cole um accessToken manualmente se já tiver"></textarea>

      <hr style="border-color:var(--border); margin:16px 0;" />

      <h2 style="padding:0 0 8px;">2 · Nova sessão</h2>
      <div class="row">
        <div>
          <label>Plataforma</label>
          <select id="platform">
            <option value="">—</option>
            <option>tiktok</option>
            <option>instagram</option>
            <option>youtube</option>
            <option>meta</option>
          </select>
        </div>
        <div>
          <label>Formato</label>
          <select id="format">
            <option value="">—</option>
            <option>reels</option>
            <option>feed</option>
            <option>story</option>
            <option>ad</option>
          </select>
        </div>
      </div>
      <button id="newSessionBtn">Criar sessão</button>
      <div class="hint">A conversa só fica disponível após criar a sessão.</div>
    </div>
  </section>

  <!-- CENTER: chat -->
  <section class="col">
    <h2>3 · Conversa com o Director</h2>
    <div class="chat" id="chat"></div>
    <div class="composer disconnected" id="composer">
      <div class="row">
        <textarea id="messageInput" placeholder="Descreva o que você quer criar... (Enter envia, Shift+Enter quebra linha)"></textarea>
        <button id="sendBtn">Enviar</button>
      </div>
    </div>
  </section>

  <!-- RIGHT: state -->
  <section class="col">
    <h2>4 · Briefing + Proposta</h2>
    <div class="col-body">
      <div id="brief"></div>

      <div id="proposalBox"></div>
      <button id="approveBtn" class="approve" disabled>✓ Aprovar e gerar (gasta crédito)</button>

      <h2 style="padding:16px 0 6px;">Eventos de geração (SSE)</h2>
      <div class="log" id="log"></div>
      <div id="resultBox"></div>
    </div>
  </section>
</main>

<script src="/creative-director-test.js"></script>
</body>
</html>
